<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Supabase</title>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<h2>Planner Tugas</h2>

<input id="judul" placeholder="Judul tugas">
<input id="tanggal" type="date">
<select id="status">
  <option value="belum">Belum</option>
  <option value="proses">Proses</option>
  <option value="selesai">Selesai</option>
</select>

<button onclick="tambahTugas()">Tambah</button>

<div id="list"></div>

<script>
// ============================
// CONFIG (ISI SENDIRI)
// ============================
const supabaseUrl = 'ISI_URL_KAMU'
const supabaseKey = 'ISI_ANON_KEY_KAMU'

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

// ============================
// LOAD DATA
// ============================
async function loadData() {
  const { data, error } = await supabase
    .from('tasks')
    .select('*')
    .order('created_at', { ascending: false })

  const list = document.getElementById('list')
  list.innerHTML = ''

  data.forEach(item => {
    list.innerHTML += `
      <div style="margin:8px 0">
        <b>${item.title}</b> (${item.status})
        <button onclick="hapus('${item.id}')">Hapus</button>
      </div>
    `
  })
}

// ============================
// TAMBAH DATA
// ============================
async function tambahTugas() {
  const title = document.getElementById('judul').value
  const date = document.getElementById('tanggal').value
  const status = document.getElementById('status').value

  await supabase.from('tasks').insert([
    { title, date, status }
  ])
}

// ============================
// HAPUS DATA
// ============================
async function hapus(id) {
  await supabase.from('tasks').delete().eq('id', id)
}

// ============================
// REALTIME
// ============================
supabase
  .channel('tasks-channel')
  .on('postgres_changes',
    { event: '*', schema: 'public', table: 'tasks' },
    () => {
      loadData()
    }
  )
  .subscribe()

// INIT
loadData()

</script>

</body>
</html>
